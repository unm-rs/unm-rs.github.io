<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — UNM Robotics</title>
    <link rel="stylesheet" href="/admin/admin.css">
</head>

<body>

    <!-- Login -->
    <div id="view-login" class="view-login">
        <div class="login-card">
            <img src="/img/rs-logo-text.png" alt="UNM Robotics" class="login-logo">
            <h1 class="login-title">Admin Panel</h1>
            <form id="form-login" class="login-form">
                <div class="field">
                    <label for="inp-email">Email</label>
                    <input type="email" id="inp-email" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="inp-password">Password</label>
                    <input type="password" id="inp-password" autocomplete="current-password" required>
                </div>
                <p class="error-msg" id="login-error" hidden></p>
                <button type="submit" class="btn btn--primary" id="btn-login">Sign in</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="view-dashboard" hidden>

        <header class="admin-header">
            <div class="admin-header__inner">
                <p class="admin-header__title">UNM Robotics — Admin</p>
                <button id="btn-logout" class="btn btn--ghost btn--sm">Sign out</button>
            </div>
        </header>

        <main class="admin-main">
            <section>
                <div class="admin-section__head">
                    <h2>Events</h2>
                    <button id="btn-add" class="btn btn--primary">+ Add Event</button>
                </div>
                <div id="events-list" class="events-list">
                    <p class="loading">Loading…</p>
                </div>
            </section>
        </main>

    </div>

    <!-- Add / Edit Modal -->
    <div id="modal-overlay" class="modal-overlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
            <div class="modal__head">
                <h2 id="modal-heading">Add Event</h2>
                <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
            </div>
            <form id="form-event" class="event-form" novalidate>
                <input type="hidden" id="f-id">

                <div class="field">
                    <label for="f-title">Title</label>
                    <input type="text" id="f-title" placeholder="e.g. Induction Night" required>
                </div>

                <div class="field">
                    <label for="f-slug">Slug</label>
                    <input type="text" id="f-slug" placeholder="e.g. induction-night" required>
                    <small>Lowercase letters and hyphens only — used in the event URL.</small>
                </div>

                <div class="field">
                    <label for="f-date">Date</label>
                    <input type="date" id="f-date">
                </div>

                <div class="field">
                    <label for="f-desc">Description</label>
                    <textarea id="f-desc" rows="6" placeholder="Describe the event…"></textarea>
                </div>

                <div class="field">
                    <label for="f-image">Banner Image</label>
                    <input type="file" id="f-image" accept="image/*">
                    <div id="image-preview" class="image-preview" hidden>
                        <img id="preview-img" src="" alt="Image preview">
                        <button type="button" id="btn-remove-img" class="btn btn--ghost btn--sm">Remove image</button>
                    </div>
                </div>

                <p class="error-msg" id="form-error" hidden></p>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn btn--ghost">Cancel</button>
                    <button type="submit" id="btn-save" class="btn btn--primary">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-client.js"></script>
    <script src="/admin/admin.js"></script>

</body>

</html>
